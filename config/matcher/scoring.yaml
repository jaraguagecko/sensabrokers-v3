# Pesos de scoring y umbrales
# Ajustar estos valores para cambiar el ranking de productos sin tocar codigo.

weights:
  tasa: 0.35          # Menor tasa = mayor score
  enganche: 0.20      # Menor enganche requerido = mayor score
  ingreso_acceso: 0.20 # Menor ingreso minimo = mayor score (accesibilidad)
  plazo: 0.10         # Mayor plazo = mayor score (flexibilidad)
  informalidad: 0.15  # Bonus si acepta ingresos informales

score_min_to_show: 0.3   # Umbral minimo para mostrar producto en resultados
max_results: 3

score_labels:
  excelente: 740
  bueno: 680
  regular: 600
  bajo: 599

income_bands:
  - label: "Menos de $15,000"
    min: 0
    max: 14999
    representative: 12000
  - label: "$15,000 - $30,000"
    min: 15000
    max: 30000
    representative: 22000
  - label: "$30,000 - $50,000"
    min: 30001
    max: 50000
    representative: 40000
  - label: "$50,000 - $100,000"
    min: 50001
    max: 100000
    representative: 70000
  - label: "Más de $100,000"
    min: 100001
    max: 9999999
    representative: 150000
