<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="Sensabrokers landing page mockup, dark refined">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#E8C84A"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#142435"/>
      <stop offset="100%" stop-color="#0E1928"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#C9A227" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1280" height="800" fill="#0A0A0A"/>

  <!-- Subtle radial vignette -->
  <ellipse cx="640" cy="100" rx="700" ry="200" fill="#C9A227" opacity="0.04"/>

  <!-- ===== Nav ===== -->
  <g font-family="Geist, Inter, system-ui, sans-serif" fill="#F5F5F0">
    <text x="64" y="56" font-size="20" font-weight="700">Sensabrokers</text>
    <circle cx="50" cy="50" r="6" fill="url(#goldGrad)"/>
    <g font-size="14" fill="#B8B8B0" font-weight="500">
      <text x="560" y="56">Crédito</text>
      <text x="640" y="56">INFONAVIT</text>
      <text x="740" y="56">Hipotecas</text>
      <text x="830" y="56">Asesores</text>
    </g>
    <!-- nav CTA -->
    <rect x="1080" y="36" width="136" height="36" rx="8" fill="none" stroke="#C9A227" stroke-width="1"/>
    <text x="1148" y="59" font-size="13" font-weight="600" fill="#C9A227" text-anchor="middle">Iniciar sesión</text>
  </g>

  <!-- ===== Hero ===== -->
  <g font-family="Geist, Inter, system-ui, sans-serif">
    <!-- eyebrow badge -->
    <rect x="64" y="140" width="200" height="28" rx="14" fill="#C9A22726" stroke="#C9A22755" stroke-width="1"/>
    <text x="80" y="158" font-size="11" font-weight="600" letter-spacing="1.4" fill="#C9A227">CRÉDITO HIPOTECARIO MX</text>

    <!-- headline -->
    <text x="64" y="232" font-size="56" font-weight="700" fill="#F5F5F0" letter-spacing="-1.2">Tu casa,</text>
    <text x="64" y="296" font-size="56" font-weight="700" fill="url(#goldGrad)" letter-spacing="-1.2">sin la letra chica.</text>

    <!-- sub -->
    <text x="64" y="340" font-size="18" fill="#B8B8B0">Calcula tu crédito INFONAVIT o bancario en 60 segundos.</text>
    <text x="64" y="364" font-size="18" fill="#B8B8B0">Un asesor humano te acompaña hasta la firma.</text>

    <!-- CTAs -->
    <g filter="url(#goldGlow)">
      <rect x="64" y="400" width="200" height="52" rx="8" fill="url(#goldGrad)"/>
    </g>
    <text x="164" y="432" font-size="15" font-weight="700" fill="#0A0A0A" text-anchor="middle">Calcular mi crédito</text>

    <rect x="280" y="400" width="180" height="52" rx="8" fill="none" stroke="#C9A227" stroke-width="1"/>
    <text x="370" y="432" font-size="15" font-weight="600" fill="#C9A227" text-anchor="middle">Hablar con asesor</text>

    <!-- trust row -->
    <g font-size="12" fill="#8A8A8A">
      <text x="64" y="500">Confían en nosotros</text>
      <rect x="64" y="514" width="80" height="18" rx="3" fill="#1F2937"/>
      <rect x="156" y="514" width="80" height="18" rx="3" fill="#1F2937"/>
      <rect x="248" y="514" width="80" height="18" rx="3" fill="#1F2937"/>
      <rect x="340" y="514" width="80" height="18" rx="3" fill="#1F2937"/>
    </g>
  </g>

  <!-- ===== Calculator card (right) ===== -->
  <g filter="url(#cardShadow)">
    <rect x="760" y="156" width="456" height="468" rx="16" fill="url(#cardGrad)" stroke="#1F2937" stroke-width="1"/>
  </g>
  <g font-family="Geist, Inter, system-ui, sans-serif" fill="#F5F5F0">
    <text x="788" y="200" font-size="11" font-weight="600" letter-spacing="1.2" fill="#C9A227">CALCULADORA</text>
    <text x="788" y="232" font-size="22" font-weight="700">¿Cuánto puedo pedir?</text>

    <!-- Field 1 -->
    <text x="788" y="276" font-size="12" fill="#B8B8B0">Salario mensual (MXN)</text>
    <rect x="788" y="286" width="400" height="44" rx="8" fill="#1A2232" stroke="#2D3748"/>
    <text x="804" y="314" font-size="16" font-weight="600" fill="#F5F5F0">$ 32,500</text>

    <!-- Field 2 -->
    <text x="788" y="354" font-size="12" fill="#B8B8B0">Tipo de crédito</text>
    <g>
      <rect x="788" y="364" width="124" height="40" rx="8" fill="#C9A22722" stroke="#C9A227"/>
      <text x="850" y="389" font-size="13" font-weight="600" fill="#C9A227" text-anchor="middle">INFONAVIT</text>
      <rect x="924" y="364" width="124" height="40" rx="8" fill="#1A2232" stroke="#2D3748"/>
      <text x="986" y="389" font-size="13" font-weight="500" fill="#B8B8B0" text-anchor="middle">Bancario</text>
      <rect x="1060" y="364" width="128" height="40" rx="8" fill="#1A2232" stroke="#2D3748"/>
      <text x="1124" y="389" font-size="13" font-weight="500" fill="#B8B8B0" text-anchor="middle">Cofinaviv.</text>
    </g>

    <!-- Field 3 plazo -->
    <text x="788" y="430" font-size="12" fill="#B8B8B0">Plazo</text>
    <rect x="788" y="440" width="400" height="6" rx="3" fill="#1A2232"/>
    <rect x="788" y="440" width="260" height="6" rx="3" fill="url(#goldGrad)"/>
    <circle cx="1048" cy="443" r="9" fill="#E8C84A" stroke="#0A0A0A" stroke-width="2"/>
    <text x="788" y="468" font-size="12" fill="#8A8A8A">10 años</text>
    <text x="1188" y="468" font-size="12" fill="#8A8A8A" text-anchor="end">30 años</text>

    <!-- Result -->
    <rect x="788" y="494" width="400" height="80" rx="12" fill="#0A0A0A" stroke="#C9A22755"/>
    <text x="804" y="518" font-size="11" font-weight="600" letter-spacing="1.2" fill="#C9A227">PUEDES PEDIR HASTA</text>
    <text x="804" y="556" font-size="32" font-weight="700" fill="#F5F5F0" font-family="Geist Mono, ui-monospace, monospace">$1,840,000 MXN</text>

    <!-- CTA -->
    <rect x="788" y="588" width="400" height="48" rx="8" fill="url(#goldGrad)"/>
    <text x="988" y="618" font-size="14" font-weight="700" fill="#0A0A0A" text-anchor="middle">Ver oferta completa →</text>
  </g>

  <!-- ===== Bottom bar ===== -->
  <rect x="0" y="740" width="1280" height="60" fill="#0E1620"/>
  <g font-family="Geist, Inter, system-ui, sans-serif" font-size="12" fill="#8A8A8A">
    <text x="64" y="776">© 2026 Sensabrokers · CNBV regulado · Aviso de privacidad</text>
    <text x="1216" y="776" text-anchor="end">v3.0</text>
  </g>
</svg>
