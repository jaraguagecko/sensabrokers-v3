<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="Sensabrokers landing page mockup, light refined">
  <defs>
    <linearGradient id="goldGradL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A07C1A"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <linearGradient id="cardGradL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAFAF7"/>
    </linearGradient>
    <filter id="cardShadowL" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0D1B2A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1280" height="800" fill="#FAFAF7"/>

  <!-- subtle gold tint at top -->
  <ellipse cx="640" cy="60" rx="700" ry="160" fill="#C9A227" opacity="0.05"/>

  <!-- ===== Nav ===== -->
  <g font-family="Geist, Inter, system-ui, sans-serif" fill="#0D1B2A">
    <text x="64" y="56" font-size="20" font-weight="700">Sensabrokers</text>
    <circle cx="50" cy="50" r="6" fill="url(#goldGradL)"/>
    <g font-size="14" fill="#4A5568" font-weight="500">
      <text x="560" y="56">Crédito</text>
      <text x="640" y="56">INFONAVIT</text>
      <text x="740" y="56">Hipotecas</text>
      <text x="830" y="56">Asesores</text>
    </g>
    <rect x="1080" y="36" width="136" height="36" rx="8" fill="none" stroke="#A07C1A" stroke-width="1"/>
    <text x="1148" y="59" font-size="13" font-weight="600" fill="#A07C1A" text-anchor="middle">Iniciar sesión</text>
  </g>

  <!-- ===== Hero ===== -->
  <g font-family="Geist, Inter, system-ui, sans-serif">
    <!-- eyebrow badge -->
    <rect x="64" y="140" width="200" height="28" rx="14" fill="#A07C1A1A" stroke="#A07C1A55" stroke-width="1"/>
    <text x="80" y="158" font-size="11" font-weight="600" letter-spacing="1.4" fill="#A07C1A">CRÉDITO HIPOTECARIO MX</text>

    <text x="64" y="232" font-size="56" font-weight="700" fill="#0D1B2A" letter-spacing="-1.2">Tu casa,</text>
    <text x="64" y="296" font-size="56" font-weight="700" fill="url(#goldGradL)" letter-spacing="-1.2">sin la letra chica.</text>

    <text x="64" y="340" font-size="18" fill="#4A5568">Calcula tu crédito INFONAVIT o bancario en 60 segundos.</text>
    <text x="64" y="364" font-size="18" fill="#4A5568">Un asesor humano te acompaña hasta la firma.</text>

    <!-- CTAs -->
    <rect x="64" y="400" width="200" height="52" rx="8" fill="url(#goldGradL)"/>
    <text x="164" y="432" font-size="15" font-weight="700" fill="#0A0A0A" text-anchor="middle">Calcular mi crédito</text>

    <rect x="280" y="400" width="180" height="52" rx="8" fill="none" stroke="#A07C1A" stroke-width="1"/>
    <text x="370" y="432" font-size="15" font-weight="600" fill="#A07C1A" text-anchor="middle">Hablar con asesor</text>

    <!-- trust row -->
    <g font-size="12" fill="#6B7280">
      <text x="64" y="500">Confían en nosotros</text>
      <rect x="64" y="514" width="80" height="18" rx="3" fill="#E5E3DC"/>
      <rect x="156" y="514" width="80" height="18" rx="3" fill="#E5E3DC"/>
      <rect x="248" y="514" width="80" height="18" rx="3" fill="#E5E3DC"/>
      <rect x="340" y="514" width="80" height="18" rx="3" fill="#E5E3DC"/>
    </g>
  </g>

  <!-- ===== Calculator card ===== -->
  <g filter="url(#cardShadowL)">
    <rect x="760" y="156" width="456" height="468" rx="16" fill="url(#cardGradL)" stroke="#E5E3DC" stroke-width="1"/>
  </g>
  <g font-family="Geist, Inter, system-ui, sans-serif">
    <text x="788" y="200" font-size="11" font-weight="600" letter-spacing="1.2" fill="#A07C1A">CALCULADORA</text>
    <text x="788" y="232" font-size="22" font-weight="700" fill="#0D1B2A">¿Cuánto puedo pedir?</text>

    <text x="788" y="276" font-size="12" fill="#4A5568">Salario mensual (MXN)</text>
    <rect x="788" y="286" width="400" height="44" rx="8" fill="#F3F2ED" stroke="#CFCDC4"/>
    <text x="804" y="314" font-size="16" font-weight="600" fill="#0D1B2A">$ 32,500</text>

    <text x="788" y="354" font-size="12" fill="#4A5568">Tipo de crédito</text>
    <g>
      <rect x="788" y="364" width="124" height="40" rx="8" fill="#A07C1A14" stroke="#A07C1A"/>
      <text x="850" y="389" font-size="13" font-weight="600" fill="#A07C1A" text-anchor="middle">INFONAVIT</text>
      <rect x="924" y="364" width="124" height="40" rx="8" fill="#F3F2ED" stroke="#CFCDC4"/>
      <text x="986" y="389" font-size="13" font-weight="500" fill="#4A5568" text-anchor="middle">Bancario</text>
      <rect x="1060" y="364" width="128" height="40" rx="8" fill="#F3F2ED" stroke="#CFCDC4"/>
      <text x="1124" y="389" font-size="13" font-weight="500" fill="#4A5568" text-anchor="middle">Cofinaviv.</text>
    </g>

    <text x="788" y="430" font-size="12" fill="#4A5568">Plazo</text>
    <rect x="788" y="440" width="400" height="6" rx="3" fill="#E5E3DC"/>
    <rect x="788" y="440" width="260" height="6" rx="3" fill="url(#goldGradL)"/>
    <circle cx="1048" cy="443" r="9" fill="#A07C1A" stroke="#FFFFFF" stroke-width="2"/>
    <text x="788" y="468" font-size="12" fill="#6B7280">10 años</text>
    <text x="1188" y="468" font-size="12" fill="#6B7280" text-anchor="end">30 años</text>

    <rect x="788" y="494" width="400" height="80" rx="12" fill="#0D1B2A"/>
    <text x="804" y="518" font-size="11" font-weight="600" letter-spacing="1.2" fill="#C9A227">PUEDES PEDIR HASTA</text>
    <text x="804" y="556" font-size="32" font-weight="700" fill="#F5F5F0" font-family="Geist Mono, ui-monospace, monospace">$1,840,000 MXN</text>

    <rect x="788" y="588" width="400" height="48" rx="8" fill="url(#goldGradL)"/>
    <text x="988" y="618" font-size="14" font-weight="700" fill="#0A0A0A" text-anchor="middle">Ver oferta completa →</text>
  </g>

  <!-- ===== Bottom bar ===== -->
  <rect x="0" y="740" width="1280" height="60" fill="#F3F2ED"/>
  <g font-family="Geist, Inter, system-ui, sans-serif" font-size="12" fill="#6B7280">
    <text x="64" y="776">© 2026 Sensabrokers · CNBV regulado · Aviso de privacidad</text>
    <text x="1216" y="776" text-anchor="end">v3.0</text>
  </g>
</svg>
